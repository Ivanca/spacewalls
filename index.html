<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake Fortress</title>
<style>
@font-face {
	font-family: 'PressStart2P';
	src: url('./PressStart2P.ttf') format('truetype');
	font-display: swap;
}
html, body {
	margin: 0;
	padding: 0;
	overflow: hidden;
	background: #05050d;
	touch-action: none;
}
body {
    min-width: 100lvw;
    min-height: 100lvh;
}

/* Rotate-device overlay */
#rotate-overlay {
	position: fixed;
	inset: 0;
	display: none;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	background: #05050d;
	color: #00e8ff;
	font-family: PressStart2P, monospace;
	    font-size: 1cqi;
	line-height: 2em;
	text-align: center;
	padding: 24px;
	z-index: 9999;
	gap: 24px;
}

#rotate-overlay svg {
	animation: spin 2s linear infinite;
}

@keyframes spin {
	0%   { transform: rotate(0deg); }
	40%  { transform: rotate(0deg); }
	60%  { transform: rotate(90deg); }
	100% { transform: rotate(90deg); }
}

/* Outro overlay */
#outro-overlay {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	display: none;
	pointer-events: none;
	z-index: 100;
	container-type: size;
}

#outro-btn-row {
	position: absolute;
	left: 50%;
	transform: translateX(-50%);
	display: flex;
	gap: 2cqi;
	pointer-events: all;
}

.credits-mode #outro-btn-row {
    position: relative;
    left: auto;
    text-align: center;
    margin: 0 auto;
    transform: none;
}

.outro-btn {
	background: #0a0a12;
	color: #e0f8ff;
	border: 2px solid #00e8ff;
	border-radius: 6px;
	padding: 10px 22px;
	font-family: PressStart2P, monospace;
	font-size: 1.1cqi;
	cursor: pointer;
	text-shadow: 0 0 8px #00e8ff;
	box-shadow: 0 0 14px #00e8ff55;
	position: relative;
}

.outro-btn--red {
	border-color: #ff4040;
	text-shadow: 0 0 8px #ff4040;
	box-shadow: 0 0 14px #ff404055;
	color: #ffe5e5;
}

.share-wrapper {
	position: relative;
}

.share-dropdown {
	display: none;
	position: absolute;
	bottom: calc(100% + 8px);
	left: 0;
	background: #0a0a12;
	border: 2px solid #00e8ff;
	border-radius: 6px;
	overflow: hidden;
	z-index: 101;
	min-width: 170px;
	white-space: nowrap;
}

.share-dropdown a {
	display: block;
	padding: 9px 16px;
	color: #e0f8ff;
	font-family: PressStart2P, monospace;
	font-size: 0.9cqi;
	text-decoration: none;
}

.share-dropdown a:hover {
	background: rgba(0, 232, 255, 0.15);
}

/* ── Pause button (touch devices only, shown via JS) ────────────────────── */
#pause-btn {
	display: none;
	position: fixed;
	top: 12px;
	right: 12px;
	z-index: 500;
	background: rgba(10, 10, 18, 0.80);
	color: white;
	border: 2px solid white;
	border-radius: 8px;
	width: 48px;
	height: 48px;
	font-size: 20px;
	line-height: 1;
	cursor: pointer;
	align-items: center;
	justify-content: center;
	pointer-events: all;
	touch-action: manipulation;
}
#pause-btn span {
	transform: scaleX(0.7);
}
/* ── Pause menu overlay ─────────────────────────────────────────────────── */
#pause-menu {
	position: fixed;
	inset: 0;
	display: none;
	align-items: center;
	justify-content: center;
	background: rgba(5, 5, 13, 0.88);
	z-index: 600;
}

.pause-menu-box {
	display: flex;
	flex-direction: column;
	align-items: stretch;
	gap: 16px;
	padding: 36px 28px;
	background: #0a0a12;
	border: 2px solid #00e8ff;
	border-radius: 10px;
	box-shadow: 0 0 30px #00e8ff44;
	min-width: 260px;
	max-width: 90vw;
}

.pause-menu-title {
	font-family: PressStart2P, monospace;
	color: #00e8ff;
	font-size: 15px;
	text-shadow: 0 0 10px #00e8ff;
	text-align: center;
	margin-bottom: 8px;
}

.pause-menu-btn {
	background: #0a0a12;
	color: #e0f8ff;
	border: 2px solid #00e8ff;
	border-radius: 6px;
	padding: 13px 20px;
	font-family: PressStart2P, monospace;
	font-size: 10px;
	cursor: pointer;
	text-shadow: 0 0 8px #00e8ff;
	box-shadow: 0 0 14px #00e8ff55;
	touch-action: manipulation;
	text-align: center;
}

.pause-menu-btn--red {
	border-color: #ff4040;
	color: #ffe5e5;
	text-shadow: 0 0 8px #ff4040;
	box-shadow: 0 0 14px #ff404055;
}

/* ── Credits panel (inside outro-overlay, for About view) ───────────────── */
#credits-panel {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	display: none;
	flex-direction: column;
	align-items: center;
	gap: 24px;
	padding: 0 24px;
	width: 70%;
}

#outro-overlay.credits-mode {
	background: rgba(5, 5, 13, 0.88);
	pointer-events: all;
	z-index: 600;
}

#credits-text {
	font-family: PressStart2P, monospace;
	color: #e0f8ff;
	font-size: 1cqi;
	line-height: 2.2em;
	text-align: center;
	text-shadow: 0 0 6px #00e8ff88;
}

#about-close-btn {
	background: #0a0a12;
	color: #e0f8ff;
	border: 2px solid #00e8ff;
	border-radius: 6px;
	padding: 11px 28px;
	font-family: PressStart2P, monospace;
	font-size: 10px;
	cursor: pointer;
	text-shadow: 0 0 8px #00e8ff;
	box-shadow: 0 0 14px #00e8ff55;
	touch-action: manipulation;
}

</style>
</head>
<body>
	<div id="rotate-overlay">
		<!-- <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#00e8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
			<rect x="4" y="2" width="16" height="20" rx="2" />
			<path d="M9 7l3-3 3 3" />
			<path d="M15 17l-3 3-3-3" />
		</svg> -->
		<a id="fullscreen-rotate-btn">Before We Start<br>Tap Here To Go Fullscreen & Rotate</a>
	</div>

	<!-- Pause button (shown on touch devices via JS) -->
	<button id="pause-btn" aria-label="Pause"><span>&#9646;&#9646;</span></button>

	<!-- Pause menu -->
	<div id="pause-menu">
		<div class="pause-menu-box">
			<div class="pause-menu-title">PAUSED</div>
			<button id="pause-resume-btn" class="pause-menu-btn">Resume</button>
			<button id="pause-restart-btn" class="pause-menu-btn">Restart Level</button>
			<button id="pause-about-btn" class="pause-menu-btn">About the Author</button>
		</div>
	</div>

	<div id="outro-overlay">
		<!-- Credits panel (shown from pause menu About option) -->
		<div id="credits-panel">
			<div id="credits-text"></div>
			<button id="about-close-btn">Close</button>
		</div>
		<div id="outro-btn-row">
			<div class="share-wrapper">
				<button id="share-btn" class="outro-btn" type="button">Share Game</button>
				<div id="share-dropdown" class="share-dropdown">
					<a href="https://twitter.com/intent/tweet?url=https%3A%2F%2Fivanca.github.io%2Fspacewalls%2F&text=Check%20out%20Space%20Walls!%20" target="_blank" rel="noopener noreferrer">Twitter / X</a>
					<a href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fivanca.github.io%2Fspacewalls%2F" target="_blank" rel="noopener noreferrer">Facebook</a>
					<a href="https://bsky.app/intent/compose?text=Check%20out%20Space%20Walls!%20https%3A%2F%2Fivanca.github.io%2Fspacewalls%2F" target="_blank" rel="noopener noreferrer">Bluesky</a>
					<a href="mailto:?subject=Check%20out%20Space%20Walls!&body=https%3A%2F%2Fivanca.github.io%2Fspacewalls%2F">Email</a>
				</div>
			</div>
			<button id="yt-btn" class="outro-btn outro-btn--red" type="button">YouTube Channel</button>
		</div>
	</div>

<script type="module" src="scripts/game.js"></script>
</body>
</html>
