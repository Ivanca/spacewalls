<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake Fortress</title>
<style>
@font-face {
	font-family: 'PressStart2P';
	src: url('./PressStart2P.ttf') format('truetype');
	font-display: swap;
}
html, body {
	margin: 0;
	padding: 0;
	overflow: hidden;
	background: #05050d;
	touch-action: none;
}
body {
    min-width: 100vw;
    min-height: 100vh;
}

/* Rotate-device overlay */
#rotate-overlay {
	position: fixed;
	inset: 0;
	display: none;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	background: #05050d;
	color: #00e8ff;
	font-family: PressStart2P, monospace;
	font-size: clamp(10px, 3vw, 18px);
	line-height: 2em;
	text-align: center;
	padding: 24px;
	z-index: 9999;
	gap: 24px;
}

#rotate-overlay svg {
	animation: spin 2s linear infinite;
}

@keyframes spin {
	0%   { transform: rotate(0deg); }
	40%  { transform: rotate(0deg); }
	60%  { transform: rotate(90deg); }
	100% { transform: rotate(90deg); }
}

/* Outro overlay */
#outro-overlay {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	display: none;
	pointer-events: none;
	z-index: 100;
	container-type: size;
}

#outro-btn-row {
	position: absolute;
	left: 50%;
	transform: translateX(-50%);
	display: flex;
	gap: 16px;
	pointer-events: all;
}

.outro-btn {
	background: #0a0a12;
	color: #e0f8ff;
	border: 2px solid #00e8ff;
	border-radius: 6px;
	padding: 10px 22px;
	font-family: PressStart2P, monospace;
	font-size: 1.1cqi;
	cursor: pointer;
	text-shadow: 0 0 8px #00e8ff;
	box-shadow: 0 0 14px #00e8ff55;
	position: relative;
}

.outro-btn--red {
	border-color: #ff4040;
	text-shadow: 0 0 8px #ff4040;
	box-shadow: 0 0 14px #ff404055;
	color: #ffe5e5;
}

.share-wrapper {
	position: relative;
}

.share-dropdown {
	display: none;
	position: absolute;
	bottom: calc(100% + 8px);
	left: 0;
	background: #0a0a12;
	border: 2px solid #00e8ff;
	border-radius: 6px;
	overflow: hidden;
	z-index: 101;
	min-width: 170px;
	white-space: nowrap;
}

.share-dropdown a {
	display: block;
	padding: 9px 16px;
	color: #e0f8ff;
	font-family: PressStart2P, monospace;
	font-size: 0.9cqi;
	text-decoration: none;
}

.share-dropdown a:hover {
	background: rgba(0, 232, 255, 0.15);
}

</style>
</head>
<body>
	<div id="rotate-overlay">
		<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#00e8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
			<rect x="4" y="2" width="16" height="20" rx="2" />
			<path d="M9 7l3-3 3 3" />
			<path d="M15 17l-3 3-3-3" />
		</svg>
		<span>Please rotate your device<br>to landscape mode</span>
	</div>

	<div id="outro-overlay">
		<div id="outro-btn-row">
			<div class="share-wrapper">
				<button id="share-btn" class="outro-btn" type="button">Share Game</button>
				<div id="share-dropdown" class="share-dropdown">
					<a href="https://twitter.com/intent/tweet?url=https%3A%2F%2Fwww.spacewallsgame.com&text=Check%20out%20Space%20Walls!%20" target="_blank" rel="noopener noreferrer">Twitter / X</a>
					<a href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fwww.spacewallsgame.com" target="_blank" rel="noopener noreferrer">Facebook</a>
					<a href="https://bsky.app/intent/compose?text=Check%20out%20Space%20Walls!%20https%3A%2F%2Fwww.spacewallsgame.com" target="_blank" rel="noopener noreferrer">Bluesky</a>
					<a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a>
					<a href="mailto:?subject=Check%20out%20Space%20Walls!&body=https%3A%2F%2Fwww.spacewallsgame.com">Email</a>
				</div>
			</div>
			<button id="yt-btn" class="outro-btn outro-btn--red" type="button">YouTube Channel</button>
		</div>
	</div>

<script type="module" src="scripts/game.js"></script>
</body>
</html>
